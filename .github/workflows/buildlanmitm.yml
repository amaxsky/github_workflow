name: Build Lanmitm (Legacy Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Lanmitm
        run: |
          git clone https://github.com/dalufine/Lanmitm.git
          cd Lanmitm
          ls -al

      - name: Install JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Download legacy Android SDK (r20)
        run: |
          wget https://dl.google.com/android/android-sdk_r20-linux.tgz -O sdk.tgz
          tar -xzf sdk.tgz
          mv android-sdk-linux $HOME/android-sdk

      - name: Install platform android-19
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools:$PATH
          echo "y" | android update sdk --no-ui --filter platform-tools,android-19

      - name: Generate build.xml
        working-directory: Lanmitm
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools:$PATH
          android update project -p . -t android-19

      - name: Build with Ant
        working-directory: Lanmitm
        run: ant debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lanmitm-debug-apk
          path: Lanmitm/bin/*-debug.apk
